<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- viewport importante para celular -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>AR.js Mobile Fix</title>

    <!-- Scripts -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        /* força vídeo e canvas a ocuparem a tela */
        canvas,
        video {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            object-fit: cover !important;
        }
    </style>
</head>

<body>

    <a-scene embedded vr-mode-ui="enabled: false" renderer="logarithmicDepthBuffer: true;"
        arjs="sourceType: webcam; debugUIEnabled: false;">

        <a-assets>
            <a-asset-item id="typewriter" src="model.glb"></a-asset-item>
        </a-assets>

        <a-marker type="pattern" url="pattern-marker.patt">

            <a-entity rotation="0 0 -90">

                <!-- modelo -->
                <a-entity gltf-model="#typewriter" position="0 0 0" rotation="-90 0 0" scale="0.5 0.5 0.5">
                </a-entity>

            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>

    </a-scene>

</body>

</html>
